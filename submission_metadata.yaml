reproduce_command: "python3 rank.py --candidates ./candidates.jsonl --out ./team_antigravity.csv"

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.9.6"
  os: "macOS 14"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for candidate profile exploration, design, implementation, and verification of the ranking system. No candidate data was sent to external LLMs; ranking is fully local.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A robust rule-based scoring engine featuring hard exclusions for honeypots (impossible career dates, founding-year violations, expert skills with 0 duration) and service-only consulting backgrounds. Incorporates core AI skill matching (duration + endorsements), years of experience (tapering around the 5-9y sweet spot), and behavioral multiplier scoring (availability, location, recruiter response rate, and notice period). Achieves 100% compliance with zero honeypots in top 100, executing in 12 seconds on a CPU-only machine.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
